<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recorder Smoke</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0b1220 0%, #1a2440 100%);
        color: #e8edf5;
      }
      .card {
        padding: 48px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        min-width: 360px;
      }
      h1 { margin: 0 0 24px; font-size: 28px; }
      button {
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #4f7cff;
        background: #2d5cff;
        color: white;
        cursor: pointer;
      }
      button:hover { background: #4070ff; }
      #status { margin-top: 24px; opacity: 0.7; min-height: 1.5em; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Recorder Smoke Fixture</h1>
      <button id="primary">Click me</button>
      <div id="status"></div>
    </div>
    <script>
      document.getElementById("primary").addEventListener("click", () => {
        document.getElementById("status").textContent = "clicked ✓";
      });
    </script>
  </body>
</html>
